<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="#cbd5e1" opacity="0.3"/>
  <circle cx="700" cy="500" r="80" fill="#cbd5e1" opacity="0.3"/>
  <circle cx="650" cy="150" r="40" fill="#94a3b8" opacity="0.2"/>
  <circle cx="150" cy="480" r="50" fill="#94a3b8" opacity="0.2"/>
  
  <!-- 404 Text -->
  <text x="400" y="320" 
        font-family="'Segoe UI', 'Arial', sans-serif" 
        font-size="180" 
        font-weight="bold" 
        fill="url(#textGradient)" 
        text-anchor="middle"
        dominant-baseline="middle">
    404
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="400" 
        font-family="'Segoe UI', 'Arial', sans-serif" 
        font-size="24" 
        fill="#64748b" 
        text-anchor="middle">
    页面未找到
  </text>
  
  <!-- Divider line -->
  <line x1="300" y1="440" x2="500" y2="440" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Suggestion text -->
  <text x="400" y="480" 
        font-family="'Segoe UI', 'Arial', sans-serif" 
        font-size="16" 
        fill="#94a3b8" 
        text-anchor="middle">
    请检查网址是否正确，或返回首页
  </text>
  
  <!-- Small decorative dots -->
  <circle cx="250" cy="250" r="6" fill="#94a3b8" opacity="0.4"/>
  <circle cx="550" cy="250" r="6" fill="#94a3b8" opacity="0.4"/>
  <circle cx="300" cy="520" r="4" fill="#94a3b8" opacity="0.3"/>
  <circle cx="500" cy="520" r="4" fill="#94a3b8" opacity="0.3"/>
</svg>